name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: pytest --cov=budget --cov-fail-under=100 -q

      - name: Run flake8 style checks
        run: python -m flake8 budget tests

      - name: Run radon cyclomatic complexity
        run: python -m radon cc budget -s

      - name: Run xenon complexity threshold
        run: python -m xenon budget -a B -m B -b B
